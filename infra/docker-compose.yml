version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: aegis
      POSTGRES_PASSWORD: aegis
      POSTGRES_DB: aegis
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

  redis:
    image: redis:7
    ports: ["6379:6379"]

  mock_inference:
    build:
      context: ..
      dockerfile: infra/Dockerfile.simulator
    ports: ["8100:8100"]

  backend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.backend
    env_file: ../.env
    ports:
      - "8000:8000"
      - "50051:50051"
    depends_on: [postgres, redis, mock_inference]

  frontend:
    build:
      context: ../frontend
      dockerfile: ../infra/Dockerfile.frontend
    ports: ["5173:5173"]
    depends_on: [backend]

volumes:
  pgdata:
