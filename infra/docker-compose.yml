services:
  simulator:
    build:
      context: ..
      dockerfile: infra/Dockerfile.simulator
    ports: ["8100:8100"]
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8100/health').raise_for_status()"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.backend
    env_file: ../.env
    ports:
      - "8000:8000"
      - "50051:50051"
    depends_on:
      simulator:
        condition: service_healthy
    environment:
      - DATABASE_URL=sqlite:///./aegis.db
      - SIMULATOR_URL=http://simulator:8100
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ../frontend
      dockerfile: ../infra/Dockerfile.frontend
    ports: ["5173:5173"]
    depends_on:
      backend:
        condition: service_healthy
